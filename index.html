<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="cursor"></div>
    <div class="container">
        <h1>Happy Birthday Anjali💗</h1>
        <div class="greeting"></div>
        <button class="cta-button">Click to Enter Our World 💕</button>
    </div>

    <script src="script.js">
        
    </script>
    
    <audio id="bgMusic" loop>
  <source src="backgroundmusicforvideos-happy.mp3" type="audio/mpeg">
</audio>

<script>
  var music = document.getElementById('bgMusic');
  
  // Check karo agar gaana pichle page pe already chal raha tha
  var trackTime = sessionStorage.getItem('songTime');
  if (trackTime) {
    music.currentTime = trackTime; // Gaana wahin se shuru hoga
  }

  // Play karne ka try karo
  music.play().catch(function() {
    // Agar browser allow na kare bina click ke, toh click ka wait karo
    document.body.addEventListener('click', function() {
      music.play();
    }, { once: true });
  });

  // Har half-second mein time save karo taaki next page ko pata rahe gaana kahan tak pahocha
  setInterval(function() {
    if (!music.paused) {
      sessionStorage.setItem('songTime', music.currentTime);
    }
  }, 500);
</script>
    
</body>
</html>

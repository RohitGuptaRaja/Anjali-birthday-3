<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="cursor"></div>
    <div class="container">
        <h1>Happy Birthday Anjali💗</h1>
        <div class="greeting"></div>
        <button class="cta-button">Click to Enter Our World 💕</button>
    </div>

    <script src="script.js">
        
    </script>
    
    <audio id="bgMusic" loop>
  <source src="backgroundmusicforvideos-happy-birthday-334876.mp3" type="audio/mpeg">
</audio>

<script>
  // Jaise hi screen par kahin bhi click hoga, music start ho jayega
  document.body.addEventListener('click', function() {
    var music = document.getElementById('bgMusic');
    if (music.paused) {
      music.play();
    }
  }, { once: true }); // 'once: true' ka matlab sirf pehle click pe kaam karega
</script>
    
</body>
</html>
